name: Bug report
description: Report a reproducible Olyq problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the problem.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: Chrome 124, Edge 124, Firefox 125, etc.
    validations:
      required: true
  - type: input
    id: olyq-version
    attributes:
      label: Olyq version or commit
      placeholder: v0.1.0 or commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Do not include API keys, OAuth tokens, private page content, or other secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed API keys, OAuth tokens, private page content, and other secrets from this report.
          required: true
        - label: This is not a security vulnerability report.
          required: true
